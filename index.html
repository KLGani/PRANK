<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EduPredict - AI-Powered Student Performance Predictor" />
    <meta name="theme-color" content="#3B82F6" />
    <title>EduPredict - Student Performance Predictor</title>
    <style>
      /* Prevent FOUC (Flash of Unstyled Content) */
      html { visibility: hidden; opacity: 0; }
    </style>
    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // This script handles redirects from 404.html for GitHub Pages SPA routing
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Show content once React loads
      document.addEventListener('DOMContentLoaded', function() {
        document.documentElement.style.visibility = 'visible';
        document.documentElement.style.opacity = '1';
      });
    </script>
  </body>
</html>
